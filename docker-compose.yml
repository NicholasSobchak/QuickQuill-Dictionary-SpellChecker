services:
  backend:
    image: nicksobchak/quickquill 
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - redis
    volumes:
      - ./dictionary.db:/app/dictionary.db:ro
      - ./config.json:/app/config.json:ro
    expose:
      - "8080"
    environment:
      - SERVER_PORT=8080
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    command: ./dict_crow

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web/dist:/usr/share/nginx/html:ro
      - nginx_data:/var/cache/nginx
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  redis_data:
  nginx_data:
