<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quick Quill - Suggested Words</title>
    <link rel="stylesheet" href="/assets/fonts.css" />
    <link rel="icon" href="/assets/quill.png" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <header class="site-header">
      <button class="nav-button dictionary-toggle" onclick="window.location.href='./'">
        <span class="history-text">Dictionary</span>
      </button>
      <button class="nav-button suggest-toggle" onclick="window.location.href='suggestions.html'">
        <span class="history-text">Suggested Words</span>
      </button>
      <button class="nav-button history-toggle" onclick="window.location.href='history.html'">
        <span class="history-text">History</span>
      </button>
    </header>

    <div class="shell">
      <section class="card suggested-page">
        <div class="suggested-page-header">
          <h1 class="suggested-page-title">Suggested Words</h1>
        </div>
        <div class="line-container">
          <img src="/assets/school_line.png" alt="" class="page-title-line" />
          <div class="button-row">
            <button class="back-button" onclick="window.location.href='./'">
              <span>Back to Dictionary</span>
            </button>
            <button id="clearAllSuggestions" class="clear-history-button">Clear All</button>
          </div>
        </div>
        <div id="suggestedWordsList" class="suggested-words-grid"></div>
        <div id="suggestedEmpty" class="history-empty">No suggested words yet.</div>
      </section>
    </div>

    <footer class="site-footer">
      <div class="footer-content">
        <a
          href="https://github.com/NicholasSobchak/QuickQuill-Dictionary-SpellChecker"
          target="_blank"
          rel="noopener"
          class="github-link"
          aria-label="GitHub Repository"
        >
          <svg class="github-icon" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 1.27a11 11 0 00-3.48 21.46c.55.09.73-.24.73-.53v-1.84c-3.03.66-3.67-1.46-3.67-1.46-.5-1.26-1.22-1.6-1.22-1.6-.98-.67.08-.66.08-.66 1.08.08 1.65 1.11 1.65 1.11.97 1.65 2.55 1.17 3.17.9.1-.7.38-1.17.69-1.44-2.42-.27-4.96-1.21-4.96-5.38 0-1.19.43-2.17 1.13-2.93-.11-.28-.49-1.39.11-2.89 0 0 .91-.29 3 1.12a10.33 10.33 0 015.51 0c2.09-1.41 3-1.12 3-1.12.6 1.5.22 2.61.11 2.89.71.76 1.13 1.74 1.13 2.93 0 4.18-2.55 5.1-4.98 5.37.39.34.73 1 .73 2.02v3.01c0 .3.18.63.74.53A11 11 0 0012 1.27"
            />
          </svg>
        </a>
        <p class="footer-disclaimer">
          QuickQuill is an independent project and has no affiliation with any organizations. All
          marks remain the property of their respective owners.
        </p>
      </div>
    </footer>

      <script>
        const SUGGESTED_KEY = 'quickquill-suggested-words';
        const SUGGESTED_LIMIT = 1000;
      const suggestedWordsList = document.getElementById('suggestedWordsList');
      const suggestedEmpty = document.getElementById('suggestedEmpty');
      const clearAllButton = document.getElementById('clearAllSuggestions');

      function loadSuggestedWords() {
        const stored = localStorage.getItem(SUGGESTED_KEY);
        return stored ? JSON.parse(stored) : [];
      }

      function saveSuggestedWords(words) {
        localStorage.setItem(SUGGESTED_KEY, JSON.stringify(words.slice(0, SUGGESTED_LIMIT)));
      }

      function renderSuggestedWords() {
        const words = loadSuggestedWords();
        suggestedWordsList.innerHTML = '';

        if (!words.length) {
          suggestedEmpty.style.display = 'block';
          suggestedWordsList.style.display = 'none';
          return;
        }

        suggestedEmpty.style.display = 'none';
        suggestedWordsList.style.display = 'flex';

        words.forEach((word) => {
          const chip = document.createElement('button');
          chip.type = 'button';
          chip.className = 'chip suggested-chip';
          chip.textContent = word;
          chip.addEventListener('click', () => {
            window.location.href = `./?word=${encodeURIComponent(word)}`;
          });
          suggestedWordsList.appendChild(chip);
        });
      }

      clearAllButton.addEventListener('click', () => {
        localStorage.removeItem(SUGGESTED_KEY);
        renderSuggestedWords();
      });

      renderSuggestedWords();
    </script>
  </body>
</html>
