<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quick Quill</title>
    <link rel="stylesheet" href="/assets/fonts.css" />
    <link rel="icon" href="/assets/quill.png" />
  </head>
  <body>
    <header class="site-header">
        <button class="nav-button dictionary-toggle" onclick="window.location.href='./'">
          <span class="history-text">Dictionary</span>
        </button>
        <button id="suggestToggle" class="nav-button suggest-toggle">
          <span class="history-text">Suggested Words</span>
        </button>
        <button id="historyToggle" class="nav-button history-toggle">
          <span class="history-text">History</span>
        </button>
      </header>

      <div class="logo-container">
        <div class="brand">
          <img class="brand-logo" src="/assets/QuickQuill-logo.png" alt="QuickQuill" />
        </div>
      </div>

      <img src="/assets/school_line.png" alt="" class="header-line" />

      <div class="shell">
      <section class="card">
        <div class="row">
          <button id="promptGo" class="prompt" type="button" aria-label="Look up word">
            <img class="prompt-icon" src="/assets/magnifying-glass-svgrepo-com.svg" alt="" />
          </button>
          <input id="word" placeholder="lookup &lt;word&gt;" autocomplete="off" />
          <button id="go">run</button>
        </div>
        <div id="status" class="status">
          <span id="spinner" class="spinner"></span>
          <span id="statusText"></span>
        </div>
        <div id="alternativeSearches" class="alternative-searches hidden"></div>
        <div id="resultBox" class="result-box">
          <div id="result" class="result"></div>
        </div>
        <div id="suggestedBox" class="result-box suggested-box has-results">
          <div class="suggested-content">
            <p class="suggested-title">Similar Searches</p>
            <div id="suggestedList" class="suggested-list"></div>
          </div>
        </div>
        </section>
      </div>

    <footer class="site-footer">
      <div class="footer-content">
        <a
          href="https://github.com/NicholasSobchak/QuickQuill-Dictionary-SpellChecker"
          target="_blank"
          rel="noopener"
          class="github-link"
          aria-label="GitHub Repository"
        >
          <svg class="github-icon" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 1.27a11 11 0 00-3.48 21.46c.55.09.73-.24.73-.53v-1.84c-3.03.66-3.67-1.46-3.67-1.46-.5-1.26-1.22-1.6-1.22-1.6-.98-.67.08-.66.08-.66 1.08.08 1.65 1.11 1.65 1.11.97 1.65 2.55 1.17 3.17.9.1-.7.38-1.17.69-1.44-2.42-.27-4.96-1.21-4.96-5.38 0-1.19.43-2.17 1.13-2.93-.11-.28-.49-1.39.11-2.89 0 0 .91-.29 3 1.12a10.33 10.33 0 015.51 0c2.09-1.41 3-1.12 3-1.12.6 1.5.22 2.61.11 2.89.71.76 1.13 1.74 1.13 2.93 0 4.18-2.55 5.1-4.98 5.37.39.34.73 1 .73 2.02v3.01c0 .3.18.63.74.53A11 11 0 0012 1.27"
            />
          </svg>
        </a>
        <p class="footer-disclaimer">
          QuickQuill is an independent project and has no affiliation with any organizations. All
          marks remain the property of their respective owners.
        </p>
      </div>
    </footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
