<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quick Quill</title>
  <link rel="stylesheet" href="/assets/fonts.css">
  <style>
    :root {
      --bg-1: #000000;
      --bg-2: #000000;
      --ink: #ffffff;
      --muted: #b6b6b6;
      --accent: #ffffff;
      --card: #0a0a0a;
      --edge: #2a2a2a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Times New Roman", Times, serif;
      font-size: 17px;
      letter-spacing: 0.5px;
      color: var(--ink);
      background-color: #000000;
      background-image:
        radial-gradient(ellipse at center, rgba(0, 0, 0, 0) 8%, rgba(0, 0, 0, 0.9) 30%, rgba(0, 0, 0, 0.97) 55%, rgba(0, 0, 0, 1) 72%, rgba(0, 0, 0, 1) 100%),
        linear-gradient(to right, rgba(0, 0, 0, 1) 0%, rgba(0, 0, 0, 0) 12%, rgba(0, 0, 0, 0) 88%, rgba(0, 0, 0, 1) 100%),
        linear-gradient(to bottom, rgba(0, 0, 0, 1) 0%, rgba(0, 0, 0, 0) 14%, rgba(0, 0, 0, 0) 86%, rgba(0, 0, 0, 1) 100%),
        linear-gradient(rgba(0, 0, 0, 0.99), rgba(0, 0, 0, 0.99)),
        url("/assets/school_backdrop.jpg");
      background-size: 260% 260%, 100% 100%, 100% 100%, 100% 100%, contain;
      background-repeat: no-repeat, no-repeat, no-repeat, no-repeat, no-repeat;
      background-position: center center, center center, center center, center center, center top;
      background-attachment: fixed, fixed, fixed, fixed, fixed;
      background-blend-mode: multiply, multiply, multiply, multiply, normal;
      min-height: 100vh;
      padding-bottom: 72px;
    }

    .shell {
      max-width: 1200px;
      margin: 0 auto;
      padding: 48px 20px 80px;
      flex: 1 0 auto;
    }


  header {
      margin-bottom: 18px;
      text-align: center;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      position: relative;
      left: 50px;
    }

    .wordmark-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .title {
      margin: 0 0 8px;
      line-height: 1;
      color: var(--ink);
      letter-spacing: 0.01em;
      font-size: clamp(52px, 8.2vw, 76px);
      font-family: "Quotex", "Cinzel", "Cormorant Garamond", "Palatino Linotype", "Book Antiqua", serif;
      font-weight: 400;
    }

    .latin-tag {
      margin: -18px 0 0 44px;
      color: #ffffff;
      font-size: 12px;
      letter-spacing: 0.8px;
      line-height: 1;
      white-space: nowrap;
      font-family: "Quotex", "Cinzel", "Cormorant Garamond", "Palatino Linotype", "Book Antiqua", serif;
      font-weight: 400;
    }

    .quill {
      display: block;
      width: 122px;
      height: auto;
      filter: invert(1);
      transform: translate(-40px, -6px);
    }

    .school-logo {
      display: block;
      width: 28px;
      height: auto;
      filter: grayscale(1) contrast(1.8) brightness(1.45);
      transform: translate(-121px, 36px);
    }

    .sub {
      color: #ffffff;
      margin: 0;
      font-size: 13px;
    }

    .card {
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0;
      box-shadow: none;
      overflow: visible;
    }

    /* History drawer */
    .history-toggle {
      position: fixed;
      top: 8px;
      right: 16px;
      z-index: 30;
      background: transparent;
      color: var(--ink);
      border: none;
      padding: 8px 12px;
      font-family: "Times New Roman", Times, serif;
      font-size: 14px;
      letter-spacing: 0.4px;
      cursor: pointer;
      transition: transform 240ms ease, background 200ms ease;
    }


    .history-toggle:hover {
      background: rgba(26, 26, 26, 0);
      text-decoration: underline;
    }

    .toggle-arrow {
      margin-left: 6px;
      font-size: 12px;
      display: inline-block;
      transform: translateY(-1px);
      font-family: Arial, sans-serif;
      font-weight: 400;
    }

    .history-toggle[aria-expanded="true"] {
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
    }

    /* Suggested drawer (mirrors history, left side) */
    .suggest-toggle {
      position: fixed;
      top: 8px;
      left: 16px;
      z-index: 30;
      background: transparent;
      color: var(--ink);
      border: none;
      padding: 8px 12px;
      font-family: "Times New Roman", Times, serif;
      font-size: 14px;
      letter-spacing: 0.4px;
      cursor: pointer;
      transition: transform 240ms ease, background 200ms ease;
      text-decoration: none;
    }

    .suggest-toggle:hover {
      background: rgba(26, 26, 26, 0);
      text-decoration: underline;
    }

    .suggest-drawer {
      position: fixed;
      top: 0;
      left: 16px;
      right: auto;
      z-index: 25;
      width: auto;
      max-width: 1200px;
      max-height: 70vh;
      overflow-y: auto;
      background: transparent;
      border: none;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.6);
      transform: translateY(-100%);
      transition: transform 260ms ease;
      backdrop-filter: blur(3px);
      overflow: visible;
    }

    .suggest-drawer.open {
      transform: translateY(18px);
    }

    .suggest-drawer .corner {
      position: absolute;
      width: 28px;
      height: 28px;
      background-image: url(/assets/box-corner.png);
      background-size: contain;
      background-repeat: no-repeat;
      filter: invert(1);
      pointer-events: none;
      visibility: visible;
    }

    .suggest-drawer .corner-tl { top: -8px; left: -14px; }
    .suggest-drawer .corner-tr { top: -8px; right: -14px; transform: rotate(90deg); }
    .suggest-drawer .corner-bl { bottom: -14px; left: -14px; transform: rotate(-90deg); }
    .suggest-drawer .corner-br { bottom: -14px; right: -14px; transform: rotate(180deg); }

    .history-drawer {
      position: fixed;
      top: 0;
      right: 16px;
      left: auto;
      z-index: 25;
      width: auto;
      max-width: 1200px;
      max-height: 70vh;
      overflow-y: auto;
      background: transparent;
      border: none;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.6);
      transform: translateY(-100%);
      transition: transform 260ms ease;
      backdrop-filter: blur(3px);
      overflow: visible;
    }

    .history-drawer.open {
      transform: translateY(18px);
    }

    .history-drawer .corner {
      position: absolute;
      width: 28px;
      height: 28px;
      background-image: url(/assets/box-corner.png);
      background-size: contain;
      background-repeat: no-repeat;
      filter: invert(1);
      pointer-events: none;
      visibility: visible;
    }

    .history-drawer .corner-tl { top: -8px; left: -14px; }
    .history-drawer .corner-tr { top: -8px; right: -14px; transform: rotate(90deg); }
    .history-drawer .corner-bl { bottom: -14px; left: -14px; transform: rotate(-90deg); }
    .history-drawer .corner-br { bottom: -14px; right: -14px; transform: rotate(180deg); }

    .history-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 14px 22px 18px;
      display: grid;
      gap: 8px;
    }

    .history-title {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0.8px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .history-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .history-item {
      padding: 6px 10px;
      border: none;
      background: #000;
      cursor: pointer;
      font-size: 14px;
      letter-spacing: 0.3px;
      transition: background 150ms ease, transform 150ms ease;
      text-decoration: none;
    }

    .history-item:hover {
      background: #111;
      transform: none;
      text-decoration: underline;
    }

    .history-empty {
      color: var(--muted);
      font-style: italic;
      font-size: 14px;
    }


    .card::before {
      display: none;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .prompt {
      color: var(--ink);
      font-weight: 700;
      letter-spacing: 1px;
      font-size: 14px;
    }

    input {
      flex: 1 1 260px;
      padding: 10px 12px;
      border-radius: 0;
      border: none;
      font-size: 17px;
	  font-family: inherit;
      background: transparent;
      color: var(--ink);
      outline: none;
    }

    #go {
      display: none;
    }

    .toggle-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 8px auto 0;
      padding: 0;
      background: transparent;
      color: var(--muted);
      border: none;
      cursor: pointer;
      font-size: 15px;
      font-family: "Times New Roman", Times, serif;
      text-transform: none;
      letter-spacing: 0.5px;
    }

    .toggle-btn .arrow {
      font-family: Arial, sans-serif;
    }

    .toggle-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .result-box {
      position: relative;
      /* border: 1px solid var(--edge); */ /* Border removed */
      padding: 20px;
      margin-top: 30px;
      margin-bottom: 30px;
      min-height: 80px;
    }

    .corner-tl, .corner-tr, .corner-bl, .corner-br {
      position: absolute;
      width: 40px;
      height: 40px;
      background-image: url(/assets/box-corner.png);
      background-size: contain;
      background-color: transparent;
      filter: invert(1);
      visibility: hidden;
    }

    .result-box.has-results .corner-tl,
    .result-box.has-results .corner-tr,
    .result-box.has-results .corner-bl,
    .result-box.has-results .corner-br {
      visibility: visible;
    }

    .corner-tl {
      top: -20px;
      left: -20px;
    }

    .corner-tr {
      top: -20px;
      right: -20px;
      transform: rotate(90deg);
    }

    .corner-bl {
      bottom: -20px;
      left: -20px;
      transform: rotate(-90deg);
    }

    .corner-br {
      bottom: -20px;
      right: -20px;
      transform: rotate(180deg);
    }

    .result {
      margin-top: 0;
      font-size: 17px;
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0;
      min-height: 0;
    }


    .section {
      margin-top: 14px;
    }

    .label {
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .lemma {
      font-size: 42px;
      margin: 0;
    }

    .chip {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 0;
      border: none;
      margin: 4px 6px 0 0;
      font-size: 12px;
      background: transparent;
      cursor: pointer;
      color: inherit;
      text-decoration: none;
    }

    .chip:hover {
      text-decoration: underline;
    }

    .list {
      margin: 0;
      padding-left: 18px;
      list-style-position: outside;
    }

    .extra { display: none; }
    .list.show-all .extra { display: list-item; }

    .empty {
      color: var(--muted);
      font-style: italic;
    }
    .error {
      color: #ff6666;
      font-weight: 400;
      font-size: 13px;
    }

    .status .suggestion-link {
      color: inherit;
      text-decoration: none;
      cursor: pointer;
    }
    .status .suggestion-link:hover em {
      text-decoration: underline;
    }
    .status em {
      font-style: italic;
      font-weight: normal;
    }
    .status em.corrected-word {
      font-weight: bold;
      text-decoration: underline;
      color: #ff7777; /* Slightly lighter shade of red */
    }



    .status {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .spinner {
      width: 1ch;
      display: none;
      color: var(--ink);
    }

    .disclaimer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      color: #7a7a7a;
      font-size: 14px;
      text-align: center;
      font-family: "Times New Roman", Times, serif;
      letter-spacing: 0.5px;
      padding: 12px 0 16px;
      margin: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="shell">
    <button id="suggestToggle" class="suggest-toggle" aria-expanded="false" aria-controls="suggestDrawer">
      <span class="history-text">Suggested Words</span>
      <span class="toggle-arrow">v</span>
    </button>
    <div id="suggestDrawer" class="suggest-drawer" aria-hidden="true">
      <span class="corner corner-tl"></span>
      <span class="corner corner-tr"></span>
      <span class="corner corner-bl"></span>
      <span class="corner corner-br"></span>
      <div class="history-inner">
        <p class="history-title">Suggested Words</p>
        <ul id="suggestList" class="history-list"></ul>
        <div id="suggestEmpty" class="history-empty">No suggestions yet.</div>
      </div>
    </div>

    <button id="historyToggle" class="history-toggle" aria-expanded="false" aria-controls="historyDrawer">
      <span class="history-text">History</span>
      <span class="toggle-arrow">v</span>
    </button>
    <div id="historyDrawer" class="history-drawer" aria-hidden="true">
      <span class="corner corner-tl"></span>
      <span class="corner corner-tr"></span>
      <span class="corner corner-bl"></span>
      <span class="corner corner-br"></span>
      <div class="history-inner">
        <p class="history-title">Recent searches</p>
        <ul id="historyList" class="history-list"></ul>
        <div id="historyEmpty" class="history-empty">No searches yet.</div>
      </div>
    </div>

    <header>
      <div class="brand">
        <div class="wordmark-wrap">
          <h1 class="title">QuickQuill</h1>
          <p class="latin-tag">Lexicon Levissimum</p>
        </div>
        <img class="quill" src="/assets/quill.png" alt="">
                <img class="school-logo" src="/assets/school-logo-no-bg.png" alt="School logo">
      </div>
    </header>

    <section class="card">
      <div class="row">
        <span class="prompt">&gt;</span>
        <input id="word" placeholder="lookup &lt;word&gt;" autocomplete="off">
        <button id="go">run</button>
      </div>
      <div id="status" class="status">
        <span id="spinner" class="spinner"></span>
        <span id="statusText"></span>
      </div>
      <div class="result-box">
        <div class="corner-tl"></div>
        <div class="corner-tr"></div>
        <div class="corner-bl"></div>
        <div class="corner-br"></div>
        <div id="result" class="result"></div>
      </div>
    </section>

  </div>

  <p class="disclaimer">QuickQuill is an independent project and has no affiliation with any organizations. All marks remain the property of their respective owners.</p>

  <script>
    const input = document.getElementById("word");
    const result = document.getElementById("result");
    const spinner = document.getElementById("spinner");
    const statusText = document.getElementById("statusText");
    const button = document.getElementById("go");
    const historyToggle = document.getElementById("historyToggle");
    const historyDrawer = document.getElementById("historyDrawer");
    const historyList = document.getElementById("historyList");
    const historyEmpty = document.getElementById("historyEmpty");
    const suggestToggle = document.getElementById("suggestToggle");
    const suggestDrawer = document.getElementById("suggestDrawer");
    const suggestList = document.getElementById("suggestList");
    const suggestEmpty = document.getElementById("suggestEmpty");
    const HISTORY_KEY = "quickquill-history";
    const HISTORY_LIMIT = 30;
    let spinnerTimer = null;

    function loadHistory() {
      const stored = localStorage.getItem(HISTORY_KEY);
      return stored ? JSON.parse(stored) : [];
    }

    function saveHistory(words) {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(words.slice(0, HISTORY_LIMIT)));
    }

    function renderHistory() {
      const items = loadHistory();
      historyList.innerHTML = "";
      if (!items.length) {
        historyEmpty.style.display = "block";
        historyList.style.display = "none";
        return;
      }
      historyEmpty.style.display = "none";
      historyList.style.display = "flex";
      items.forEach((w) => {
        const li = document.createElement("li");
        li.className = "history-item";
        li.textContent = w;
        li.addEventListener("click", () => {
          li.style.textDecoration = "underline";
          input.value = w;
          lookup();
        });
        historyList.appendChild(li);
      });
    }

    function renderSuggest() {
      suggestList.innerHTML = "";
      suggestEmpty.style.display = "block";
      suggestList.style.display = "none";
    }

    function addToHistory(word) {
      if (!word) return;
      const items = loadHistory();
      const filtered = items.filter((w) => w.toLowerCase() !== word.toLowerCase());
      filtered.unshift(word);
      saveHistory(filtered);
      renderHistory();
    }

    function updateHistoryLayout() {
      const viewport = { w: window.innerWidth };
      const sidePad = 16;

      let available = viewport.w - sidePad * 2 - 40;
      let width = Math.min(1000, Math.max(180, available));
      let left = viewport.w - sidePad - width;

      if (left < sidePad) {
        left = sidePad;
        available = viewport.w - sidePad * 2;
        width = Math.min(1200, Math.max(180, available));
      }

      historyDrawer.style.left = `${left}px`;
      historyDrawer.style.right = "auto";
      historyDrawer.style.width = `${width}px`;

      const btnRect = historyToggle.getBoundingClientRect();
      if (historyToggle.dataset.manual === "1") {
        const currentLeft = parseFloat(historyToggle.style.left) || left;
        const clampedLeft = Math.min(Math.max(currentLeft, sidePad), viewport.w - sidePad - btnRect.width);
        historyToggle.style.left = `${clampedLeft}px`;
      } else {
        const centeredLeft = left + Math.max((width - btnRect.width) / 2, 0);
        const clampedLeft = Math.min(Math.max(centeredLeft, sidePad), viewport.w - sidePad - btnRect.width);
        historyToggle.style.left = `${clampedLeft}px`;
      }
      historyToggle.style.right = "auto";
      historyToggle.style.transform = "translate(0, 0)";

      const arrow = historyToggle.querySelector(".toggle-arrow");
      if (arrow) arrow.textContent = historyDrawer.classList.contains("open") ? "^" : "v";
    }

    function updateSuggestLayout() {
      const viewport = { w: window.innerWidth };
      const sidePad = 16;

      const left = sidePad;
      const width = Math.min(1000, Math.max(180, viewport.w - sidePad * 2 - 40));

      suggestDrawer.style.left = `${left}px`;
      suggestDrawer.style.right = "auto";
      suggestDrawer.style.width = `${width}px`;

      const btnRect = suggestToggle.getBoundingClientRect();
      if (suggestToggle.dataset.manual === "1") {
        const currentLeft = parseFloat(suggestToggle.style.left) || left;
        const clampedLeft = Math.min(Math.max(currentLeft, sidePad), viewport.w - sidePad - btnRect.width);
        suggestToggle.style.left = `${clampedLeft}px`;
      } else {
        const centeredLeft = left + Math.max((width - btnRect.width) / 2, 0);
        const clampedLeft = Math.min(Math.max(centeredLeft, sidePad), viewport.w - sidePad - btnRect.width);
        suggestToggle.style.left = `${clampedLeft}px`;
      }
      suggestToggle.style.right = "auto";
      suggestToggle.style.transform = "translate(0, 0)";

      const arrow = suggestToggle.querySelector(".toggle-arrow");
      if (arrow) arrow.textContent = suggestDrawer.classList.contains("open") ? "^" : "v";
    }

    function resolveToggleOverlap() {
      const pad = 16;
      const gap = 8;
      const vw = window.innerWidth;
      const brand = document.querySelector(".brand");
      const brandRect = brand ? brand.getBoundingClientRect() : { left: vw / 2, right: vw / 2 };
      const brandCenter = (brandRect.left + brandRect.right) / 2;
      const sugWidth = suggestToggle.offsetWidth || 0;
      const histWidth = historyToggle.offsetWidth || 0;
      let sugLeft = parseFloat(suggestToggle.style.left) || pad;
      let histLeft = parseFloat(historyToggle.style.left) || (vw - pad - histWidth);

      const totalNeeded = sugWidth + gap + histWidth;
      const available = vw - pad * 2;

      let overlap = false;

      if (totalNeeded > available) {
        const start = Math.max(pad, brandCenter - totalNeeded / 2);
        sugLeft = start - 60;
        histLeft = sugLeft + gap + sugWidth;
        overlap = true;
      } else if (sugLeft + sugWidth + gap > histLeft) {
        const start = Math.max(pad, brandCenter - totalNeeded / 2);
        sugLeft = start - 60;
        histLeft = sugLeft + gap + sugWidth;
        overlap = true;
      }

      // Clamp to viewport
      histLeft = Math.min(histLeft, vw - pad - histWidth);
      sugLeft = Math.min(sugLeft, vw - pad - sugWidth);

      suggestToggle.style.left = `${sugLeft}px`;
      historyToggle.style.left = `${histLeft}px`;
      suggestToggle.style.right = "auto";
      historyToggle.style.right = "auto";

      suggestToggle.dataset.manual = overlap ? "1" : "0";
      historyToggle.dataset.manual = overlap ? "1" : "0";
    }

    function toggleHistory(open) {
      const shouldOpen = open ?? !historyDrawer.classList.contains("open");
      if (shouldOpen) {
        toggleSuggest(false);
      }
      historyDrawer.classList.toggle("open", shouldOpen);
      historyDrawer.setAttribute("aria-hidden", shouldOpen ? "false" : "true");
      historyToggle.setAttribute("aria-expanded", shouldOpen ? "true" : "false");
      requestAnimationFrame(() => {
        updateHistoryLayout();
        resolveToggleOverlap();
      });
      if (shouldOpen) renderHistory();
    }

    historyToggle.addEventListener("click", () => toggleHistory());
    window.addEventListener("resize", () => {
      updateHistoryLayout();
      updateSuggestLayout();
      resolveToggleOverlap();
    });
    requestAnimationFrame(() => {
      updateHistoryLayout();
      updateSuggestLayout();
      resolveToggleOverlap();
    });

    function toggleSuggest(open) {
      const shouldOpen = open ?? !suggestDrawer.classList.contains("open");
      if (shouldOpen) {
        toggleHistory(false);
      }
      suggestDrawer.classList.toggle("open", shouldOpen);
      suggestDrawer.setAttribute("aria-hidden", shouldOpen ? "false" : "true");
      suggestToggle.setAttribute("aria-expanded", shouldOpen ? "true" : "false");
      if (shouldOpen) renderSuggest();
      requestAnimationFrame(() => {
        updateSuggestLayout();
        resolveToggleOverlap();
      });
    }

    suggestToggle.addEventListener("click", () => toggleSuggest());

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && historyDrawer.classList.contains("open")) {
        toggleHistory(false);
      }
      if (e.key === "Escape" && suggestDrawer.classList.contains("open")) {
        toggleSuggest(false);
      }
    });

    function clearResult() {
      while (result.firstChild) result.removeChild(result.firstChild);
      const resultBox = document.querySelector('.result-box');
      if (resultBox) {
        resultBox.classList.remove('has-results');
      }
    }

    function setStatus(text, isError = false) {
      statusText.innerHTML = text || "";
      statusText.style.color = isError ? "#ff6666" : "var(--muted)";
    }

    function addSection(title) {
      const section = document.createElement("div");
      section.className = "section";
      const label = document.createElement("div");
      label.className = "label";
      label.textContent = title;
      section.appendChild(label);
      result.appendChild(section);
      return section;
    }

    function appendNumberedList(section, items) {
      const list = document.createElement("ol");
      list.className = "list";

      items.forEach((text, idx) => {
        const item = document.createElement("li");
        item.textContent = text;
        if (idx >= 5) item.classList.add("extra");
        list.appendChild(item);
      });

      section.appendChild(list);

      if (items.length > 5) {
        const toggle = document.createElement("button");
        toggle.type = "button";
        toggle.className = "toggle-btn";
        const label = document.createTextNode("see more ");
        const arrow = document.createElement("span");
        arrow.className = "arrow";
        arrow.textContent = "v";
        toggle.appendChild(label);
        toggle.appendChild(arrow);
        toggle.setAttribute("aria-expanded", "false");
        toggle.addEventListener("click", () => {
          const expanded = list.classList.toggle("show-all");
          label.textContent = expanded ? "see less " : "see more ";
          arrow.textContent = expanded ? "^" : "v";
          toggle.setAttribute("aria-expanded", expanded);
        });
        const toggleWrap = document.createElement("div");
        toggleWrap.style.display = "flex";
        toggleWrap.style.justifyContent = "center";
        toggleWrap.style.transform = "translateX(0px)";
        toggleWrap.appendChild(toggle);
        section.appendChild(toggleWrap);
      }
    }

    function displayWord(text) {
      if (!text) return "";
      // Allow letters, numbers, spaces, apostrophes, and hyphens; replace anything else with a space, then collapse.
      return text
        .replace(/[^A-Za-z0-9'’ -]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function renderWord(data, requestedWord) {
      clearResult();

      // New logic for handling word not found with suggestion
      if (data.found === false) {
        if (data.suggestion && data.suggestion.toLowerCase() !== data.query.toLowerCase()) {
          const suggestionHTML = `Did you mean <a href="#" class="suggestion-link" onclick="event.preventDefault(); document.getElementById('word').value='${data.suggestion}'; lookup();"><em class="corrected-word">${data.display_lemma || data.suggestion}</em></a>?`;
          setStatus(suggestionHTML, true);
        } else {
          setStatus(`Word <em>'${input.value}'</em> not found.`, true);
        }
        return;
      }

      // Existing error handling for actual API errors (e.g., 400 Bad Request)
      if (data.error) {
        if (data.error === "Enter a valid word") {
          setStatus("400: Enter a valid word", true);        } else {
          // Fallback for other errors not explicitly handled
          setStatus(`Error: ${data.error}`, true);
        }
        return;
      }

      const resultBox = document.querySelector('.result-box');
      if (resultBox) {
        resultBox.classList.add('has-results');
      }

      const lemma = document.createElement("h2");
      lemma.className = "lemma";
      const rawHeading = data.display_lemma || data.query || data.lemma || "";
      let decodedHeading = rawHeading;
      try {
        decodedHeading = decodeURIComponent(rawHeading);
      } catch (_) {
        // keep rawHeading if decode fails
      }
      const heading = displayWord(decodedHeading);
      const capitalizedHeading = heading.charAt(0).toUpperCase() + heading.slice(1);
      const punctuated = capitalizedHeading && capitalizedHeading.toLowerCase() === "lexicon levissimum"
        ? `${capitalizedHeading}!`
        : capitalizedHeading;
      lemma.textContent = punctuated || "Unknown";
      if (capitalizedHeading && capitalizedHeading.toLowerCase() === "nevermore") {
        const link = document.createElement("a");
        link.href = "https://www.nevermoreacademy.com/";
        link.target = "_blank";
        link.rel = "noreferrer noopener";
        link.textContent = " https://www.nevermoreacademy.com/";
        link.style.color = "var(--ink)";
        link.style.fontFamily = '"Times New Roman", Times, serif';
        link.style.fontSize = "17px";
        link.style.fontWeight = "400";
        link.style.marginLeft = "8px";
        lemma.appendChild(link);
      }
      result.appendChild(lemma);

      const sensesSection = addSection("Definition");
      if (Array.isArray(data.senses) && data.senses.length) {
        const items = data.senses.map((s) => {
          const pos = s.pos ? `[${s.pos}] ` : "";
          return `${pos}${s.definition || ""}`.trim();
        });
        appendNumberedList(sensesSection, items);
      } else {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No definitions available.";
        sensesSection.appendChild(empty);
      }

      const synSection = addSection("Synonyms");
      const syns = Array.isArray(data.senses)
        ? data.senses.flatMap((s) => Array.isArray(s.synonyms) ? s.synonyms : [])
        : [];
      if (syns.length) {
        const wrap = document.createElement("div");
        syns.forEach((w) => {
          const chip = document.createElement("a");
          chip.className = "chip";
          chip.textContent = w;
          chip.href = "#";
          chip.onclick = (e) => {
            e.preventDefault();
            input.value = w;
            lookup();
          };
          wrap.appendChild(chip);
        });
        synSection.appendChild(wrap);
      } else {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No synonyms available.";
        synSection.appendChild(empty);
      }

      const antSection = addSection("Antonyms");
      const ants = Array.isArray(data.senses)
        ? data.senses.flatMap((s) => Array.isArray(s.antonyms) ? s.antonyms : [])
        : [];
      if (ants.length) {
        const wrap = document.createElement("div");
        ants.forEach((w) => {
          const chip = document.createElement("a");
          chip.className = "chip";
          chip.textContent = w;
          chip.href = "#";
          chip.onclick = (e) => {
            e.preventDefault();
            input.value = w;
            lookup();
          };
          wrap.appendChild(chip);
        });
        antSection.appendChild(wrap);
      } else {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No antonyms available.";
        antSection.appendChild(empty);
      }

      const exSection = addSection("Examples");
      const examples = Array.isArray(data.senses)
        ? data.senses.flatMap((s) => Array.isArray(s.examples) ? s.examples : [])
        : [];
      if (examples.length) {
        appendNumberedList(exSection, examples);
      } else {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No examples available.";
        exSection.appendChild(empty);
      }

      const formsSection = addSection("Forms");
      if (Array.isArray(data.forms) && data.forms.length) {
        const wrap = document.createElement("div");
        data.forms.forEach((f) => {
          const chip = document.createElement("a");
          chip.className = "chip";
          chip.textContent = f.tag ? `${f.form} (${f.tag})` : f.form;
          chip.href = "#";
          chip.onclick = (e) => {
            e.preventDefault();
            input.value = f.form;
            lookup();
          };
          wrap.appendChild(chip);
        });
        formsSection.appendChild(wrap);
      } else {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No forms available.";
        formsSection.appendChild(empty);
      }

      const etySection = addSection("Etymology");
      if (Array.isArray(data.etymology) && data.etymology.length) {
        appendNumberedList(etySection, data.etymology);
      } else {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No etymology available.";
        etySection.appendChild(empty);
      }
    }

    async function lookup() {
      const word = input.value.trim();
      if (!word) {
        clearResult();
        renderWord({ error: "Enter a word" }, "");
        input.focus();
        return;
      }
      if (!/^[A-Za-z'\- .]+$/.test(word)) {
        clearResult();
        setStatus("400: Enter a valid word", true);
        input.focus();
        return;
      }

      button.disabled = true;
      spinner.style.display = "inline-block";
      if (spinnerTimer) clearInterval(spinnerTimer);
      const frames = ["|", "/", "-", ""];
      let idx = 0;
      spinner.textContent = frames[idx];
      spinnerTimer = setInterval(() => {
        idx = (idx + 1) % frames.length;
        spinner.textContent = frames[idx];
      }, 120);
      clearResult();

      try {
        setStatus("Looking up…");
        const res = await fetch(`/api/word/${encodeURIComponent(word)}`);
        const data = await res.json();
        if (!res.ok) {
          renderWord(data, word);
        } else {
          renderWord(data, word);
          setStatus("");
          addToHistory(displayWord(word));
        }
      } catch (err) {
        clearResult();
        const reason = err && err.message ? err.message : "failed to fetch";
        setStatus(`Network error: ${reason}`, true);
      } finally {
        button.disabled = false;
        spinner.style.display = "none";
        if (spinnerTimer) {
          clearInterval(spinnerTimer);
          spinnerTimer = null;
        }
      }
    }

    button.addEventListener("click", lookup);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") lookup();
    });
  </script>
</body>
</html>
