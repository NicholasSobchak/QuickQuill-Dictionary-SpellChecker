<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quick Quill</title>
  <link rel="stylesheet" href="/assets/fonts.css">
  <style>
    :root {
      --bg-1: #000000;
      --bg-2: #000000;
      --ink: #ffffff;
      --muted: #b6b6b6;
      --accent: #ffffff;
      --card: #0a0a0a;
      --edge: #2a2a2a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Courier New", "Liberation Mono", "Menlo", "Consolas", monospace;
      color: var(--ink);
      background: var(--bg-1);
      min-height: 100vh;
    }

    .shell {
      max-width: 1200px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

  header {
      margin-bottom: 18px;
      text-align: center;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .wordmark-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .title {
      margin: 0 0 8px;
      line-height: 1;
      color: var(--ink);
      letter-spacing: 0.01em;
      font-size: clamp(52px, 8.2vw, 76px);
      font-family: "Quotex", "Cinzel", "Cormorant Garamond", "Palatino Linotype", "Book Antiqua", serif;
      font-weight: 400;
    }

    .latin-tag {
      margin: -18px 0 0 44px;
      color: #ffffff;
      font-size: 12px;
      letter-spacing: 0.8px;
      line-height: 1;
      white-space: nowrap;
      font-family: "Quotex", "Cinzel", "Cormorant Garamond", "Palatino Linotype", "Book Antiqua", serif;
      font-weight: 400;
    }

    .quill {
      display: block;
      width: 122px;
      height: auto;
      filter: invert(1);
      transform: translate(-40px, -6px);
    }

    .nevermore {
      display: block;
      width: 28px;
      height: auto;
      filter: grayscale(1) contrast(1.8) brightness(1.45);
      transform: translate(-121px, 36px);
    }

    .sub {
      color: #ffffff;
      margin: 0;
      font-size: 13px;
    }

    .card {
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0;
      box-shadow: none;
      position: static;
      overflow: visible;
    }

    .card::before {
      display: none;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .prompt {
      color: var(--ink);
      font-weight: 700;
      letter-spacing: 1px;
      font-size: 14px;
    }

    input {
      flex: 1 1 260px;
      padding: 10px 12px;
      border-radius: 0;
      border: none;
      font-size: 15px;
	  font-family: inherit;
      background: #000;
      color: var(--ink);
      outline: none;
    }

    #go {
      display: none;
    }

    .toggle-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 8px auto 0;
      padding: 0;
      background: transparent;
      color: var(--muted);
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-family: "Courier New", "Liberation Mono", "Menlo", "Consolas", monospace;
      text-transform: none;
      letter-spacing: 0;
    }

    .toggle-btn .arrow {
      font-family: Arial, sans-serif;
    }

    .toggle-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .result {
      margin-top: 16px;
      font-size: 15px;
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0;
      min-height: 80px;
    }

    .section {
      margin-top: 14px;
    }

    .label {
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .lemma {
      font-size: 22px;
      margin: 0;
    }

    .chip {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 0;
      border: none;
      margin: 4px 6px 0 0;
      font-size: 12px;
      background: transparent;
    }

    .list {
      margin: 0;
      padding-left: 18px;
      list-style-position: outside;
    }

    .extra { display: none; }
    .list.show-all .extra { display: list-item; }

    .empty {
      color: var(--muted);
      font-style: italic;
    }
    .error {
      color: #ff6666;
      font-weight: 400;
      font-size: 13px;
    }

    .status {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .spinner {
      width: 1ch;
      display: none;
      color: var(--ink);
    }
  </style>
</head>

    <section class="card">
      <div class="row">
        <span class="prompt">&gt;</span>
        <input id="word" placeholder="lookup &lt;word&gt;" autocomplete="off">
        <button id="go">run</button>
      </div>
      <div id="status" class="status">
        <span id="spinner" class="spinner"></span>
        <span id="statusText"></span>
      </div>
      <div id="result" class="result"></div>
    </section>
  </div>

  <script>
    const input = document.getElementById("word");
    const result = document.getElementById("result");
    const spinner = document.getElementById("spinner");
    const statusText = document.getElementById("statusText");
    const button = document.getElementById("go");
    let spinnerTimer = null;

    function clearResult() {
      while (result.firstChild) result.removeChild(result.firstChild);
    }

    function setStatus(text, isError = false) {
      statusText.textContent = text || "";
      statusText.style.color = isError ? "#ff6666" : "var(--muted)";
    }

    function addSection(title) {
      const section = document.createElement("div");
      section.className = "section";
      const label = document.createElement("div");
      label.className = "label";
      label.textContent = title;
      section.appendChild(label);
      result.appendChild(section);
      return section;
    }

    function appendNumberedList(section, items) {
      const list = document.createElement("ol");
      list.className = "list";

      items.forEach((text, idx) => {
        const item = document.createElement("li");
        item.textContent = text;
        if (idx >= 5) item.classList.add("extra");
        list.appendChild(item);
      });

      section.appendChild(list);

      if (items.length > 5) {
        const toggle = document.createElement("button");
        toggle.type = "button";
        toggle.className = "toggle-btn";
        const label = document.createTextNode("see more ");
        const arrow = document.createElement("span");
        arrow.className = "arrow";
        arrow.textContent = "v";
        toggle.appendChild(label);
        toggle.appendChild(arrow);
        toggle.setAttribute("aria-expanded", "false");
        toggle.addEventListener("click", () => {
          const expanded = list.classList.toggle("show-all");
          label.textContent = expanded ? "see less " : "see more ";
          arrow.textContent = expanded ? "^" : "v";
          toggle.setAttribute("aria-expanded", expanded);
        });
        const toggleWrap = document.createElement("div");
        toggleWrap.style.display = "flex";
        toggleWrap.style.justifyContent = "center";
        toggleWrap.style.transform = "translateX(0px)";
        toggleWrap.appendChild(toggle);
        section.appendChild(toggleWrap);
      }
    }

    function displayWord(text) {
      if (!text) return "";
      // Allow letters, numbers, spaces, apostrophes, and hyphens; replace anything else with a space, then collapse.
      return text
        .replace(/[^A-Za-z0-9'’ -]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function renderWord(data, requestedWord) {
      clearResult();

      if (data.error) {
        const requested = requestedWord || "";
        if (data.error === "Enter a word") {
          setStatus("400: Enter a word", true);
        } else {
          setStatus("404: word not found", true);
        }
        return;
      }

      const lemma = document.createElement("h2");
      lemma.className = "lemma";
      const rawHeading = data.display_lemma || data.query || data.lemma || "";
      let decodedHeading = rawHeading;
      try {
        decodedHeading = decodeURIComponent(rawHeading);
      } catch (_) {
        // keep rawHeading if decode fails
      }
      const heading = displayWord(decodedHeading);
      const punctuated = heading && heading.toLowerCase() === "lexicon levissimum"
        ? `${heading}!`
        : heading;
      lemma.textContent = punctuated || "Unknown";
      if (heading && heading.toLowerCase() === "nevermore") {
        const link = document.createElement("a");
        link.href = "https://www.nevermoreacademy.com/";
        link.target = "_blank";
        link.rel = "noreferrer noopener";
        link.textContent = " https://www.nevermoreacademy.com/";
        link.style.color = "var(--ink)";
        link.style.fontFamily = '"Courier New", "Liberation Mono", "Menlo", "Consolas", monospace';
        link.style.fontSize = "15px";
        link.style.fontWeight = "400";
        link.style.marginLeft = "8px";
        lemma.appendChild(link);
      }
      result.appendChild(lemma);

      const sensesSection = addSection("Definition");
      if (Array.isArray(data.senses) && data.senses.length) {
        const items = data.senses.map((s) => {
          const pos = s.pos ? `[${s.pos}] ` : "";
          return `${pos}${s.definition || ""}`.trim();
        });
        appendNumberedList(sensesSection, items);
      } else {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No definitions available.";
        sensesSection.appendChild(empty);
      }

      const synSection = addSection("Synonyms");
      const syns = Array.isArray(data.senses)
        ? data.senses.flatMap((s) => Array.isArray(s.synonyms) ? s.synonyms : [])
        : [];
      if (syns.length) {
        const wrap = document.createElement("div");
        syns.forEach((w) => {
          const chip = document.createElement("span");
          chip.className = "chip";
          chip.textContent = w;
          wrap.appendChild(chip);
        });
        synSection.appendChild(wrap);
      } else {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No synonyms available.";
        synSection.appendChild(empty);
      }

      const antSection = addSection("Antonyms");
      const ants = Array.isArray(data.senses)
        ? data.senses.flatMap((s) => Array.isArray(s.antonyms) ? s.antonyms : [])
        : [];
      if (ants.length) {
        const wrap = document.createElement("div");
        ants.forEach((w) => {
          const chip = document.createElement("span");
          chip.className = "chip";
          chip.textContent = w;
          wrap.appendChild(chip);
        });
        antSection.appendChild(wrap);
      } else {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No antonyms available.";
        antSection.appendChild(empty);
      }

      const exSection = addSection("Examples");
      const examples = Array.isArray(data.senses)
        ? data.senses.flatMap((s) => Array.isArray(s.examples) ? s.examples : [])
        : [];
      if (examples.length) {
        appendNumberedList(exSection, examples);
      } else {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No examples available.";
        exSection.appendChild(empty);
      }

      const formsSection = addSection("Forms");
      if (Array.isArray(data.forms) && data.forms.length) {
        const wrap = document.createElement("div");
        data.forms.forEach((f) => {
          const chip = document.createElement("span");
          chip.className = "chip";
          chip.textContent = f.tag ? `${f.form} (${f.tag})` : f.form;
          wrap.appendChild(chip);
        });
        formsSection.appendChild(wrap);
      } else {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No forms available.";
        formsSection.appendChild(empty);
      }

      const etySection = addSection("Etymology");
      if (Array.isArray(data.etymology) && data.etymology.length) {
        appendNumberedList(etySection, data.etymology);
      } else {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No etymology available.";
        etySection.appendChild(empty);
      }
    }

    async function lookup() {
      const word = input.value.trim();
      if (!word) {
        clearResult();
        renderWord({ error: "Enter a word" }, "");
        input.focus();
        return;
      }
      if (!/^[A-Za-z' -]+$/.test(word)) {
        clearResult();
        setStatus("400: Enter a word", true);
        input.focus();
        return;
      }

      button.disabled = true;
      // spinner only
      spinner.style.display = "inline-block";
      if (spinnerTimer) clearInterval(spinnerTimer);
      const frames = ["|", "/", "-", "\\\\"];
      let idx = 0;
      spinner.textContent = frames[idx];
      spinnerTimer = setInterval(() => {
        idx = (idx + 1) % frames.length;
        spinner.textContent = frames[idx];
      }, 120);
      clearResult();

      try {
        setStatus("Looking up…");
        const res = await fetch(`/api/word/${encodeURIComponent(word)}`);
        const data = await res.json();
        if (!res.ok) {
          renderWord(data, word); // renderWord sets status for errors
        } else {
          renderWord(data, word);
          setStatus("");
        }
      } catch (err) {
        clearResult();
        const reason = err && err.message ? err.message : "failed to fetch";
        setStatus(`Network error: ${reason}`, true);
      } finally {
        button.disabled = false;
        spinner.style.display = "none";
        if (spinnerTimer) {
          clearInterval(spinnerTimer);
          spinnerTimer = null;
        }
      }
    }

    button.addEventListener("click", lookup);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") lookup();
    });
  </script>
</body>
</html>
