# HTTP - redirect to HTTPS (if SSL available) or serve directly
server {
    listen 80;
    server_name quickquill.ink www.quickquill.ink;
    
    # If SSL certs exist, redirect to HTTPS
    # Otherwise serve directly (for initial setup)
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name quickquill.ink www.quickquill.ink;

    # SSL certificates (will fail if not present - that's expected)
    ssl_certificate /etc/letsencrypt/live/quickquill.ink/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/quickquill.ink/privkey.pem;

    # If no SSL, serve HTTP only (comment out the server block above)
    # listen 80;
    # server_name quickquill.ink www.quickquill.ink;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
