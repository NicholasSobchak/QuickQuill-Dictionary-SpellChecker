name: Build & Test 

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      CLANG_FORMAT_VERSION: "17"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive' 

    # Frontend (Web) Build and Dependencies
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Frontend Dependencies
      run: npm install
      working-directory: web/

    - name: Build Frontend
      run: npm run build
      working-directory: web/

    # C++ Backend Build and Dependencies
    - name: Install C++ Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build build-essential clang-format-17 

    - name: Check C++ Formatting
      run: find src include tests -type f \( -name "*.cpp" -o -name "*.h" \) -exec clang-format-17 --dry-run --Werror {} +


    - name: Bootstrap Vcpkg
      run: |
        git clone https://github.com/microsoft/vcpkg.git
        ./vcpkg/bootstrap-vcpkg.sh

    - name: Install C++ Dependencies with Vcpkg
      run: |
        ./vcpkg/vcpkg install --triplet x64-linux # Adjust triplet if targeting different platforms
      # Vcpkg will automatically use vcpkg.json from the project root

    - name: Configure CMake
      run: cmake -B build -S . -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

    - name: Build C++ Project
      run: cmake --build build

    - name: Run C++ Tests
      run: cd build && ctest --output-on-failure
