name: Build & Test

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      CLANG_FORMAT_VERSION: "17"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    # Frontend (Web) Build and Dependencies
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Cache npm
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: npm-${{ hashFiles('web/package-lock.json') }}
        restore-keys: npm-

    - name: Install Frontend Dependencies
      run: npm ci
      working-directory: web/

    - name: Build Frontend
      run: npm run build
      working-directory: web/

    # C++ Backend Build and Dependencies
    - name: Install C++ Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build build-essential clang-format-17

    - name: Check C++ Formatting
      run: find src include tests -type f \( -name "*.cpp" -o -name "*.h" \) -exec clang-format-17 --dry-run --Werror {} +

    - name: Cache vcpkg binary cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/vcpkg/archives
        key: vcpkg-${{ hashFiles('vcpkg.json') }}
        restore-keys: vcpkg-

    - name: Bootstrap Vcpkg
      #- name: Cache vcpkg installation
      uses: actions/cache@v4
      with:
        path: vcpkg
        key: vcpkg-tool-${{ hashFiles('vcpkg.json') }}
        restore-keys: vcpkg-tool-

    - name: Bootstrap Vcpkg
      run: |
        if [ ! -f vcpkg/vcpkg ]; then
          git clone https://github.com/microsoft/vcpkg.git
          git -C vcpkg checkout 2025.04.09
          ./vcpkg/bootstrap-vcpkg.sh -disableMetrics
        fi 

    - name: Install C++ Dependencies with Vcpkg
      run: ./vcpkg/vcpkg install --triplet x64-linux

    - name: Configure CMake
      run: cmake -B build -S . -G Ninja -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

    - name: Build C++ Project
      run: cmake --build build

    - name: Run C++ Tests
      run: ctest --test-dir build --output-on-failure
