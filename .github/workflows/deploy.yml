name: Deploy to Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # Build the backend binary inside Docker (just for compilation — not pushed, not run on VPS).
      # Using Debian bookworm ensures the binary links against the same glibc as the VPS.
      - name: Build backend binary (Docker-based cross-compile)
        run: |
          DOCKER_BUILDKIT=1 docker build --target builder --output type=local,dest=/tmp/qq-build .
          ls -lh /tmp/qq-build/src/build/src/dict_crow
          cp /tmp/qq-build/src/build/src/dict_crow ./dict_crow

      # Build the frontend
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: |
          cd web
          npm ci
          npm run build

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd /var/www/quickquill
            git pull
            if [ ! -f config.json ]; then
              printf '{"database_path":"dictionary.db","server_port":8080}\n' > config.json
            fi

      - name: Copy artifacts to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dict_crow,web/dist"
          target: /var/www/quickquill
          strip_components: 0

      - name: Restart services
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            chmod +x /var/www/quickquill/dict_crow
            sudo systemctl restart quickquill-backend
            sudo systemctl restart nginx
            echo "Deploy complete"
